services:
  db:
    container_name: bxzella-db
    image: postgres:18.4-bookworm
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "6432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql
